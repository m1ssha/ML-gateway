version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-llm_gateway}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - gateway-network-dev

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - gateway-network-dev

  ml-service:
    build:
      context: ../ml_service
      dockerfile: Dockerfile.dev
    environment:
      - MODEL_PATH=/app/ml-artifacts/model-weights.pt
      - TOKENIZER_PATH=/app/ml-artifacts
    ports:
      - "8000:8000"
    volumes:
      - ../ml_service/app:/app/app
    networks:
      - gateway-network-dev

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    depends_on:
      - postgres
      - redis
      - ml-service
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-llm_gateway}
      - REDIS_URL=redis://redis:6379/0
      - ML_SERVICE_URL=http://ml-service:8000
      - LLM_PROVIDER=mock
    ports:
      - "8001:8001"
    volumes:
      - ../backend:/app
      - /app/venv
    networks:
      - gateway-network-dev

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_BASE_URL=/api
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - gateway-network-dev

networks:
  gateway-network-dev:
    driver: bridge

volumes:
  postgres-dev-data:
