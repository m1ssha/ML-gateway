version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  ml-service:
    build:
      context: ../ml_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MODEL_PATH=/app/ml-artifacts/model-weights.pt
      - TOKENIZER_PATH=/app/ml-artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - gateway-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ML_SERVICE_URL=${ML_SERVICE_URL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - THRESHOLD_LOW=${THRESHOLD_LOW}
      - THRESHOLD_HIGH=${THRESHOLD_HIGH}
      - CUMULATIVE_THRESHOLD=${CUMULATIVE_THRESHOLD}
    volumes:
      - ../logs:/app/logs
      - ./scripts/entrypoint-backend.sh:/infrastructure/scripts/entrypoint-backend.sh:ro
      - ./scripts/wait-for-it.sh:/infrastructure/scripts/wait-for-it.sh:ro
    entrypoint: ["/bin/sh", "/infrastructure/scripts/wait-for-it.sh", "postgres:5432", "--", "/bin/sh", "/infrastructure/scripts/entrypoint-backend.sh"]
    networks:
      - gateway-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gateway-network

  nginx-gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - gateway-network

networks:
  gateway-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
